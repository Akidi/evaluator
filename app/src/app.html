<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="text-scale" content="scale" />

		<!-- Apply the saved theme before first paint to avoid a flash of the wrong
		     theme. Must stay in sync with ThemeToggle's storageKey ('theme'). -->
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark')
					document.documentElement.setAttribute('data-theme', t);
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
